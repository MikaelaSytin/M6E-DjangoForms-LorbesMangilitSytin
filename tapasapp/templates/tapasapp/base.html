<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Tapas Menu{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body style = "background-color: #eee3d0;">

<nav class="navbar position-relative py-3" style="background-color: #6b0000;">
    <div class="container-fluid d-flex justify-content-center align-items-center">
        <span class="text-white text-center"
              style="font-family: 'Playfair Display', serif; font-weight: 700; font-size: 2.5rem;">
            My Tapas Menu
        </span>
        {% block nav_buttons %}{% endblock %}
    </div>
</nav>

<div class="container-lg mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
