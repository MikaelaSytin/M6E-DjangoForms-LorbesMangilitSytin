{% extends 'tapasapp/base.html' %}

{% block title %}Dish Details{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">Dish Details:</div>
    <div class="card-body">
        <h2>{{ d.name }}</h2>
        <p>Cook Time: {{ d.cook_time }}</p>
        <p>Prep Time: {{ d.prep_time }}</p>
        <p>
            <a href="{% url 'update_dish' pk=pk dish_id=d.id %}" class="btn btn-success">Update</a>
            <a href="{% url 'delete_dish' pk=pk dish_id=d.id %}" class="btn btn-danger">Delete</a>
        </p>
        <a href="{% url 'better_menu' pk=pk %}" class="btn btn-secondary">Back</a>
    </div>
</div>
{% endblock %}
