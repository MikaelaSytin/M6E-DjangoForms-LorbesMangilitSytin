{% extends 'tapasapp/base.html' %}

{% block title %}Manage Account{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">Manage Account</div>
    <div class="card-body">
        <h4>Username: {{ user.username }}</h4>
        <div class="mt-3">
            <a href="{% url 'change_password' pk=pk %}" class="btn btn-primary me-2">Change Password</a>
            <a href="{% url 'delete_account' pk=pk %}" class="btn btn-danger me-2">Delete Account</a>
            <a href="{% url 'better_menu' pk=pk %}" class="btn btn-secondary">Back</a>
        </div>
    </div>
</div>
{% endblock %}
